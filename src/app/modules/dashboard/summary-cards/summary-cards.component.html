<div class="summary-cards-container" *ngIf="dashboardData; else loading">
  <div class="card">
    <div class="card-icon-wrapper">
      <i class="fas fa-project-diagram"></i> <!-- Icon for Total Projects -->
    </div>
    <h3 class="card-title">Total Projects</h3>
    <p class="card-value">{{ dashboardData.totalProjects }}</p>
  </div>
  <div class="card">
    <div class="card-icon-wrapper">
      <i class="fas fa-tasks"></i> <!-- Icon for Total Analysis Jobs -->
    </div>
    <h3 class="card-title">Total Analysis Jobs</h3>
    <p class="card-value">{{ dashboardData.totalJobs }}</p>
  </div>
  <div class="card">
    <div class="card-icon-wrapper">
      <i class="fas fa-file-code"></i> <!-- Using an icon for Total Files Uploaded -->
    </div>
    <h3 class="card-title">Total Files Uploaded</h3>
    <p class="card-value">{{ dashboardData.totalFiles || 0 }}</p>
  </div>

  <div class="card">
    <div class="card-icon-wrapper">
      <i class="fas fa-clock"></i> <!-- Using an icon for Last Active -->
    </div>
    <h3 class="card-title">Last Active</h3>
    <p class="card-value">{{ dashboardData.lastActive ? (dashboardData.lastActive | date: 'medium') : 'N/A' }}</p>
  </div>
</div>

<ng-template #loading>
  <app-loader></app-loader>
</ng-template>
