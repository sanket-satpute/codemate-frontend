<div class="ai-chat-page">
  <!-- Header -->
  <header class="chat-header">
    <div class="header-left">
      <div class="header-icon">
        <i class="fas fa-comments"></i>
      </div>
      <div class="header-text">
        <h1>AI Chat</h1>
        <span class="project-label" *ngIf="projectName()">
          <i class="fas fa-folder-open"></i> {{ projectName() }}
        </span>
      </div>
    </div>
    <div class="header-actions">
      <button class="clear-btn" (click)="clearChat()" [disabled]="chatMessages().length === 0">
        <i class="fas fa-eraser"></i>
        <span>Clear</span>
      </button>
    </div>
  </header>

  <!-- Loading -->
  <div class="chat-loading" *ngIf="isLoading()">
    <div class="loading-dots">
      <span></span><span></span><span></span>
    </div>
    <p>Loading chat history...</p>
  </div>

  <!-- Chat body -->
  <div class="chat-body" *ngIf="!isLoading()">
    <!-- Messages -->
    <div class="messages-container" #messagesContainer>
      <!-- Welcome state -->
      <div class="welcome-state" *ngIf="chatMessages().length === 0">
        <div class="welcome-icon">
          <i class="fas fa-robot"></i>
        </div>
        <h2>How can I help?</h2>
        <p class="welcome-subtitle">Ask about your code, architecture, bugs, or get suggestions.</p>
        <div class="suggested-prompts">
          <button class="prompt-chip" *ngFor="let prompt of suggestedPrompts" (click)="useSuggestedPrompt(prompt.text)">
            <i [class]="prompt.icon"></i>
            <span>{{ prompt.label }}</span>
          </button>
        </div>
      </div>

      <!-- Message list -->
      <div
        *ngFor="let msg of chatMessages(); trackBy: trackByMessageId"
        class="message-row"
        [class.user]="msg.sender === 'USER'"
        [class.ai]="msg.sender === 'AI'"
      >
        <div class="avatar" [class.user-avatar]="msg.sender === 'USER'" [class.ai-avatar]="msg.sender === 'AI'">
          <i *ngIf="msg.sender === 'USER'" class="fas fa-user"></i>
          <i *ngIf="msg.sender === 'AI'" class="fas fa-robot"></i>
        </div>
        <div class="message-content">
          <div class="message-bubble" [class.streaming]="msg.isStreaming">
            <div class="message-text" [innerHTML]="msg.message | markdownToHtml"></div>
            <span class="typing-cursor" *ngIf="msg.isStreaming"></span>
          </div>
          <div class="message-meta" *ngIf="!msg.isStreaming">
            <span class="timestamp">{{ formatTimestamp(msg.timestamp) }}</span>
            <button class="copy-btn" *ngIf="msg.sender === 'AI'" (click)="copyMessage(msg.message)" title="Copy response">
              <i class="fas fa-copy"></i>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Input -->
    <div class="input-section">
      <div class="input-wrapper">
        <textarea
          [(ngModel)]="chatInput"
          placeholder="Ask CodeMate AI anything..."
          rows="1"
          [disabled]="isSending()"
          (keydown.enter)="$event.preventDefault(); sendMessage()"
        ></textarea>
        <button
          class="send-btn"
          [disabled]="!chatInput.trim() || isSending()"
          (click)="sendMessage()"
        >
          <i class="fas" [class.fa-paper-plane]="!isSending()" [class.fa-circle-notch]="isSending()" [class.fa-spin]="isSending()"></i>
        </button>
      </div>
      <p class="input-hint">Press Enter to send</p>
    </div>
  </div>
</div>
