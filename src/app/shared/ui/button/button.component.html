<button [ngClass]="buttonClasses" [disabled]="disabled || loading"
  [attr.aria-describedby]="loading ? 'button-loading' : null" (click)="onClick($event)"
  [type]="type === 'submit' ? 'submit' : 'button'">
  <!-- Button Text Wrapper -->
  <span class="btn-content-wrapper" [class.is-loading]="loading">
    <!-- Left Icon -->
    <i *ngIf="icon && iconPosition === 'left'" [class]="icon" class="btn-icon btn-icon-left" aria-hidden="true"></i>

    <!-- Label -->
    <span *ngIf="label" class="btn-text">{{ label }}</span>
    <span *ngIf="!label && icon && hasOnlyIcon" class="sr-only">{{ ariaLabel || 'Button' }}</span>

    <!-- Right Icon -->
    <i *ngIf="icon && iconPosition === 'right'" [class]="icon" class="btn-icon btn-icon-right" aria-hidden="true"></i>
  </span>

  <!-- Loading Spinner (Absolutely positioned over content) -->
  <span *ngIf="loading" class="btn-loading-overlay" aria-hidden="true">
    <i class="fas fa-spinner fa-spin"></i>
  </span>

  <!-- Loading Screen Reader Text -->
  <span id="button-loading" class="sr-only" *ngIf="loading">{{ loadingText }}</span>
</button>
