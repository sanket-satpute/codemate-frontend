<div class="toast-container" aria-live="polite" aria-atomic="true">
  <div
    *ngFor="let toast of toasts; trackBy: trackById"
    class="toast-item"
    [class.toast-success]="toast.type === 'success'"
    [class.toast-error]="toast.type === 'error'"
    [class.toast-warning]="toast.type === 'warning'"
    [class.toast-info]="toast.type === 'info'"
    [class.dismissing]="toast.dismissing"
    role="alert"
  >
    <div class="toast-icon">
      <i [class]="getIcon(toast.type)"></i>
    </div>
    <div class="toast-body">
      <span class="toast-title" *ngIf="toast.title">{{ toast.title }}</span>
      <span class="toast-message">{{ toast.message }}</span>
    </div>
    <button class="toast-close" (click)="dismiss(toast.id)" aria-label="Close notification">
      <i class="fas fa-times"></i>
    </button>
  </div>
</div>
